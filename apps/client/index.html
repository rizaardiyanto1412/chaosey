<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WASD Web Co-op</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #0f172a;
        --panel: #111827;
        --text: #f8fafc;
        --accent: #f97316;
        --muted: #9ca3af;
      }
      body {
        margin: 0;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        background: radial-gradient(circle at top, #1e293b, var(--bg));
        color: var(--text);
      }
      .layout {
        display: grid;
        grid-template-columns: 360px 1fr;
        min-height: 100vh;
      }
      .panel {
        padding: 20px;
        background: color-mix(in srgb, var(--panel) 92%, black);
        border-right: 1px solid #334155;
      }
      .panel h1 {
        margin-top: 0;
      }
      .panel input, .panel button {
        width: 100%;
        box-sizing: border-box;
        margin-bottom: 10px;
        padding: 10px 12px;
        border-radius: 8px;
        border: 1px solid #334155;
      }
      .panel button {
        cursor: pointer;
        border: none;
        background: var(--accent);
        color: #111827;
        font-weight: 700;
      }
      .meta {
        font-size: 14px;
        color: var(--muted);
      }
      .badge {
        font-size: 24px;
        margin: 12px 0;
        color: #fde68a;
      }
      #game {
        position: relative;
        display: grid;
        place-items: center;
      }
      #game canvas {
        border: 1px solid #334155;
        border-radius: 14px;
      }
      .touch {
        display: grid;
        grid-template-columns: repeat(3, 56px);
        gap: 8px;
        justify-content: center;
        margin-top: 16px;
      }
      .touch button {
        height: 56px;
        border-radius: 10px;
      }
      @media (max-width: 900px) {
        .layout {
          grid-template-columns: 1fr;
        }
        .panel {
          border-right: none;
          border-bottom: 1px solid #334155;
        }
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <aside class="panel">
        <h1>Tori Co-op</h1>
        <a href="/editor.html" style="display:block;color:#93c5fd;margin-bottom:10px">Open Map Editor</a>
        <input id="name" placeholder="Player name" maxlength="24" />
        <label style="display:flex;align-items:center;gap:8px;margin-bottom:10px;color:#cbd5e1;font-size:14px;">
          <input id="debugSolo" type="checkbox" style="width:auto;margin:0;" />
          Debug mode (solo start)
        </label>
        <button id="create">Create Room</button>
        <input id="roomCode" placeholder="Room code" maxlength="4" />
        <button id="join">Join Room</button>
        <button id="ready">Toggle Ready</button>
        <button id="start">Start (Host)</button>
        <button id="restart">Restart Round (Host)</button>
        <div class="badge" id="role">Role: -</div>
        <div id="room">Room: -</div>
        <div id="state">State: -</div>
        <div id="latency">RTT: - ms</div>
        <div id="players" class="meta"></div>

        <div class="touch">
          <div></div><button data-role="W">W</button><div></div>
          <button data-role="A">A</button><button data-role="S">S</button><button data-role="D">D</button>
          <div></div><div></div><div></div>
        </div>
      </aside>
      <main id="game"></main>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
