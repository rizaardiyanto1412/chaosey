<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WASD Map Editor</title>
    <style>
      :root {
        --bg: #0b1220;
        --panel: #121c30;
        --muted: #8fa3bf;
        --text: #f5f9ff;
        --accent: #34d399;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: radial-gradient(circle at top right, #1c2f4d, var(--bg));
        color: var(--text);
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      }
      .layout {
        display: grid;
        grid-template-columns: 340px 1fr;
        min-height: 100vh;
      }
      .panel {
        border-right: 1px solid #26354f;
        background: color-mix(in srgb, var(--panel) 92%, black);
        padding: 14px;
        overflow: auto;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 22px;
      }
      .sub {
        color: var(--muted);
        font-size: 13px;
        margin-bottom: 12px;
      }
      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }
      label {
        font-size: 12px;
        color: var(--muted);
        display: block;
        margin-top: 8px;
      }
      input, select, button {
        width: 100%;
        margin-top: 4px;
        border: 1px solid #2f4669;
        border-radius: 8px;
        background: #0a1425;
        color: var(--text);
        padding: 8px;
      }
      button {
        cursor: pointer;
        background: #173456;
      }
      button.primary {
        background: var(--accent);
        color: #082013;
        font-weight: 700;
      }
      .toolbar {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-top: 10px;
      }
      .right {
        overflow: auto;
        padding: 12px;
      }
      .stack {
        display: grid;
        gap: 12px;
      }
      .card {
        background: rgba(14, 22, 40, 0.78);
        border: 1px solid #2a3e5f;
        border-radius: 12px;
        padding: 10px;
      }
      #palette {
        width: 100%;
        image-rendering: pixelated;
        border: 1px solid #2a3e5f;
        border-radius: 8px;
        cursor: crosshair;
        background: #0c1322;
      }
      #map {
        image-rendering: pixelated;
        border: 1px solid #2a3e5f;
        border-radius: 10px;
        background: #091222;
        cursor: crosshair;
      }
      .status {
        font-size: 12px;
        color: var(--muted);
        margin-top: 8px;
      }
      a { color: #93c5fd; }
      @media (max-width: 960px) {
        .layout { grid-template-columns: 1fr; }
        .panel { border-right: none; border-bottom: 1px solid #26354f; }
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <aside class="panel">
        <h1>Map Editor</h1>
        <div class="sub">Paint your own map with generated tileset.</div>
        <a href="/">Back to game</a>

        <label>Tileset</label>
        <select id="tilesetSelect">
          <option value="/assets/tilesets/grass-water-tileset-v1.png">grass-water-tileset-v1</option>
        </select>

        <div class="grid">
          <div>
            <label>Tile W</label>
            <input id="tileW" type="number" value="170" min="8" step="1" />
          </div>
          <div>
            <label>Tile H</label>
            <input id="tileH" type="number" value="170" min="8" step="1" />
          </div>
          <div>
            <label>Spacing X</label>
            <input id="spacingX" type="number" value="0" min="0" step="1" />
          </div>
          <div>
            <label>Spacing Y</label>
            <input id="spacingY" type="number" value="0" min="0" step="1" />
          </div>
          <div>
            <label>Offset X</label>
            <input id="offsetX" type="number" value="0" step="1" />
          </div>
          <div>
            <label>Offset Y</label>
            <input id="offsetY" type="number" value="0" step="1" />
          </div>
        </div>

        <div class="grid">
          <div>
            <label>Map Cols</label>
            <input id="mapCols" type="number" value="32" min="4" />
          </div>
          <div>
            <label>Map Rows</label>
            <input id="mapRows" type="number" value="20" min="4" />
          </div>
          <div>
            <label>Cell Size</label>
            <input id="cellSize" type="number" value="32" min="8" />
          </div>
          <div>
            <label>Zoom</label>
            <input id="zoom" type="number" value="1" min="0.5" max="4" step="0.25" />
          </div>
        </div>

        <div class="toolbar">
          <button id="paintBtn" class="primary">Tool: Paint</button>
          <button id="eraseBtn">Tool: Erase</button>
          <button id="newMapBtn">New Map</button>
          <button id="clearBtn">Clear Map</button>
        </div>

        <div class="toolbar">
          <button id="saveLocalBtn">Save Local</button>
          <button id="loadLocalBtn">Load Local</button>
          <button id="downloadBtn">Download JSON</button>
          <button id="importBtn">Import JSON</button>
        </div>

        <input id="importFile" type="file" accept="application/json" style="display:none" />
        <div class="status" id="status">Ready.</div>
      </aside>

      <main class="right">
        <div class="stack">
          <section class="card">
            <strong>Palette</strong>
            <div class="status">Click tile to select.</div>
            <canvas id="palette" width="306" height="340"></canvas>
          </section>

          <section class="card">
            <strong>Map</strong>
            <div class="status">Left click/drag to paint, right click to erase.</div>
            <canvas id="map" width="1024" height="640"></canvas>
          </section>
        </div>
      </main>
    </div>

    <script type="module" src="/src/editor/main.ts"></script>
  </body>
</html>
